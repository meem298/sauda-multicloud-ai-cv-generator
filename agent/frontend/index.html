<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sauda — CV Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, #f0fdf4 0%, #dcfce7 50%, #d1fae5 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── Page wrapper ──────────────────────────────────────────────────── */
    .page { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }

    /* ── Chat card ─────────────────────────────────────────────────────── */
    .chat-card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(22,163,74,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 600px;
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    .chat-header {
      background: linear-gradient(135deg, #16a34a 0%, #0d6832 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 13px;
      flex-shrink: 0;
    }
    .header-avatar {
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.2);
      border: 2.5px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-name { color: #ffffff; font-size: 17px; font-weight: 700; letter-spacing: 0.2px; }
    .header-sub {
      display: flex; align-items: center; gap: 5px;
      color: rgba(255,255,255,0.8); font-size: 12px; margin-top: 2px;
    }
    .dot-live {
      width: 7px; height: 7px; border-radius: 50%;
      background: #86efac;
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* ── Progress ──────────────────────────────────────────────────────── */
    .progress-wrap {
      padding: 10px 20px 11px;
      background: #f9fafb;
      border-bottom: 1px solid #f0fdf4;
      flex-shrink: 0;
    }
    .progress-meta {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: #6b7280; margin-bottom: 6px;
    }
    #progress-label { font-weight: 500; }
    .progress-track {
      height: 5px; background: #e5e7eb; border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #16a34a, #4ade80);
      border-radius: 99px;
      width: 0%;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Messages ──────────────────────────────────────────────────────── */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 18px 16px;
      display: flex; flex-direction: column; gap: 12px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #d1fae5; border-radius: 99px; }

    .msg-row { display: flex; align-items: flex-end; gap: 8px; animation: pop 0.25s ease; }
    .msg-row.user { flex-direction: row-reverse; }
    @keyframes pop {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #16a34a, #0d6832);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      box-shadow: 0 2px 6px rgba(22,163,74,0.25);
    }

    .msg {
      max-width: 76%; padding: 10px 14px; border-radius: 18px;
      font-size: 14px; line-height: 1.6; white-space: pre-wrap;
    }
    .msg.agent {
      background: #f0fdf4;
      color: #1a2e1a;
      border: 1px solid #dcfce7;
      border-bottom-left-radius: 4px;
    }
    .msg.user {
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #ffffff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 8px rgba(22,163,74,0.3);
    }
    .msg strong { font-weight: 700; }

    /* ── Typing dots ───────────────────────────────────────────────────── */
    .typing-row { display: flex; align-items: flex-end; gap: 8px; }
    .typing-bubble {
      background: #f0fdf4; border: 1px solid #dcfce7;
      border-radius: 18px; border-bottom-left-radius: 4px;
      padding: 12px 16px; display: flex; gap: 4px; align-items: center;
    }
    .typing-bubble span {
      width: 7px; height: 7px; border-radius: 50%; background: #16a34a;
      animation: bounce 1.2s infinite;
      display: inline-block;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── Input area ────────────────────────────────────────────────────── */
    .input-area {
      padding: 12px 14px; border-top: 1px solid #f0fdf4;
      display: flex; align-items: center; gap: 8px;
      background: #fff; flex-shrink: 0;
    }
    #user-input {
      flex: 1; padding: 10px 16px;
      border: 1.5px solid #d1fae5; border-radius: 24px;
      font-size: 14px; outline: none;
      background: #f9fafb; font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
      color: #111827;
    }
    #user-input:focus { border-color: #16a34a; background: #fff; }
    #user-input::placeholder { color: #9ca3af; }
    #user-input:disabled { opacity: 0.5; cursor: not-allowed; }

    #send-btn {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, #16a34a, #15803d);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(22,163,74,0.35);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    }
    #send-btn:hover  { transform: scale(1.07); box-shadow: 0 5px 14px rgba(22,163,74,0.45); }
    #send-btn:active { transform: scale(0.93); }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
    #send-btn svg { fill: white; }

    /* ── CV output card ────────────────────────────────────────────────── */
    #cv-output {
      display: none;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(22,163,74,0.08);
      overflow: hidden;
    }
    .cv-card-header {
      background: linear-gradient(135deg, #16a34a 0%, #0d6832 100%);
      padding: 16px 22px;
    }
    .cv-card-header h2 { color: white; font-size: 16px; font-weight: 700; }
    .cv-card-header p  { color: rgba(255,255,255,0.75); font-size: 12px; margin-top: 3px; }

    #cv-text {
      width: 100%; padding: 22px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px; line-height: 1.8;
      border: none; outline: none; resize: vertical;
      min-height: 320px; color: #1a2e1a;
      background: #fafffe;
    }
    .cv-card-footer {
      padding: 14px 22px; border-top: 1px solid #f0fdf4;
      display: flex; justify-content: flex-end; background: #fff;
    }
    #download-btn {
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: white; border: none;
      padding: 10px 24px; border-radius: 24px;
      cursor: pointer; font-size: 14px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 14px rgba(22,163,74,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #download-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(22,163,74,0.45); }
    #download-btn:active { transform: translateY(0); }
    #download-btn svg { fill: white; }
  </style>
</head>
<body>
  <div class="page">

    <!-- ── Chat card ─────────────────────────────────────────── -->
    <div class="chat-card">

      <div class="chat-header">
        <div class="header-avatar">👩‍💼</div>
        <div class="header-info">
          <div class="header-name">Sauda</div>
          <div class="header-sub">
            <span class="dot-live"></span>
            <span>CV Assistant &bull; Online</span>
          </div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="progress-label">Starting up…</span>
          <span id="progress-count">0 / 8</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div id="messages"></div>

      <div class="input-area">
        <input id="user-input" type="text" placeholder="Type your answer…" autocomplete="off" />
        <button id="send-btn" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>

    </div>

    <!-- ── CV output card ─────────────────────────────────────── -->
    <div id="cv-output">
      <div class="cv-card-header">
        <h2>✨ Your CV is ready!</h2>
        <p>Review and edit below, then download as PDF</p>
      </div>
      <textarea id="cv-text" spellcheck="false"></textarea>
      <div class="cv-card-footer">
        <button id="download-btn">
          <svg width="16" height="16" viewBox="0 0 24 24">
            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
          </svg>
          Download PDF
        </button>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
